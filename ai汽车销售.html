<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI汽车销售顾问 - 智能选车助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 550px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
            max-height: 700px;
        }

        .chat-header {
            background: #1e1e2f;
            color: white;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .car-icon {
            font-size: 32px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f8f9ff;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .user .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .bubble {
            background: white;
            color: #1e1e2f;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .time {
            font-size: 0.7rem;
            margin-top: 6px;
            margin-left: 12px;
            margin-right: 12px;
            color: #888;
        }

        .user .time {
            text-align: right;
        }

        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #ddd;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
        }

        button {
            background: #667eea;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(0.96);
        }

        .quick-actions {
            padding: 8px 16px 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-top: 1px solid #f0f0f0;
            background: white;
        }

        .quick-btn {
            background: #f0f2ff;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #4c51bf;
            cursor: pointer;
            transition: 0.2s;
        }

        .quick-btn:hover {
            background: #e0e4ff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 20px;
            width: fit-content;
            border: 1px solid #e0e0e0;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.2s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="car-icon">🚗💬</div>
        <div>
            <h1>AI汽车销售顾问</h1>
            <p>智能选车 · 真实报价 · 24h在线</p>
        </div>
    </div>
    <div class="messages" id="messages">
        <div class="message ai">
            <div class="bubble">
                嗨！我是您的AI汽车销售顾问 🤖<br>
                无论您想买轿车、SUV、MPV，还是燃油/电动/混动，我都能帮您精准推荐。<br>
                可以先告诉我您的购车预算大概是多少吗？（例如：15万、20-30万、50万以上）
            </div>
            <div class="time">刚刚</div>
        </div>
    </div>
    <div class="quick-actions">
        <button class="quick-btn" data-msg="预算15万左右">💰 预算15万</button>
        <button class="quick-btn" data-msg="预算20-30万">💎 20-30万</button>
        <button class="quick-btn" data-msg="预算40万以上">🏎️ 40万以上</button>
        <button class="quick-btn" data-msg="想买纯电动车">⚡ 纯电动车</button>
        <button class="quick-btn" data-msg="想买SUV">🚙 SUV</button>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入您的问题... 例如：推荐一款家用SUV" autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
    // 模拟AI对话逻辑（基于规则 + 简单状态管理）
    let conversationState = {
        step: 'initial',      // initial, budget_received, pref_type, pref_fuel, recommending
        budget: null,
        vehicleType: null,
        fuelType: null
    };

    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = text.replace(/\n/g, '<br>');
        messageDiv.appendChild(bubble);
        const timeSpan = document.createElement('div');
        timeSpan.className = 'time';
        timeSpan.innerText = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        messageDiv.appendChild(timeSpan);
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showTyping(callback) {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai';
        typingDiv.id = 'typingIndicator';
        const bubble = document.createElement('div');
        bubble.className = 'typing';
        bubble.innerHTML = '<span></span><span></span><span></span>';
        typingDiv.appendChild(bubble);
        messagesContainer.appendChild(typingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        setTimeout(() => {
            document.getElementById('typingIndicator')?.remove();
            callback();
        }, 800);
    }

    // 核心AI回复引擎
    function getAIResponse(userMsg) {
        const msg = userMsg.toLowerCase();
        
        // 重置命令
        if (msg.includes('重置') || msg.includes('重新开始')) {
            conversationState = { step: 'initial', budget: null, vehicleType: null, fuelType: null };
            return "好的，已重置对话。请告诉我您的购车预算大概是多少？（例如：15万左右、20-30万）";
        }
        
        // 步骤1：解析预算
        if (conversationState.step === 'initial' || (conversationState.budget === null && !msg.includes('推荐'))) {
            const budgetMatch = msg.match(/(\d+)[\-~]?(\d*)\s*万/);
            if (budgetMatch) {
                let budget = budgetMatch[0];
                conversationState.budget = budget;
                conversationState.step = 'budget_received';
                return `预算 ${budget} 收到！🎯 您更倾向于哪种车型？\n1️⃣ 轿车（舒适省油）\n2️⃣ SUV（空间大，视野好）\n3️⃣ MPV（家用/商务多人出行）\n或者直接告诉我您的偏好（例如：“SUV”）。`;
            } else {
                return "请告诉我您的购车预算（如“15万”、“20-30万”），这样我能更精准地为您推荐哦～";
            }
        }
        
        // 步骤2：解析车型偏好
        if (conversationState.step === 'budget_received' && conversationState.vehicleType === null) {
            let vehicle = null;
            if (msg.includes('suv')) vehicle = 'SUV';
            else if (msg.includes('轿车') || msg.includes('轿跑') || (msg.includes('轿') && !msg.includes('跑车'))) vehicle = '轿车';
            else if (msg.includes('mpv') || msg.includes('商务车') || msg.includes('7座')) vehicle = 'MPV';
            else if (msg.includes('旅行车')) vehicle = '旅行车';
            
            if (vehicle) {
                conversationState.vehicleType = vehicle;
                conversationState.step = 'pref_type';
                return `好的，您喜欢${vehicle}。接下来请问您对动力类型有偏好吗？\n⚡ 纯电动\n⛽ 燃油车\n🔋 混合动力（插混/增程）\n如果不确定，可以回复“都可以”。`;
            } else {
                return "请选择一种车型：轿车、SUV 或 MPV。例如回复“SUV”即可。";
            }
        }
        
        // 步骤3：解析能源类型
        if (conversationState.step === 'pref_type' && conversationState.fuelType === null) {
            let fuel = null;
            if (msg.includes('纯电') || msg.includes('电动') || msg.includes('ev')) fuel = '纯电动';
            else if (msg.includes('燃油') || msg.includes('汽油') || msg.includes('油车')) fuel = '燃油';
            else if (msg.includes('混动') || msg.includes('插混') || msg.includes('增程')) fuel = '混合动力';
            else if (msg.includes('都可以') || msg.includes('随便') || msg.includes('不限')) fuel = '任意';
            
            if (fuel) {
                conversationState.fuelType = fuel;
                conversationState.step = 'recommending';
                // 调用推荐逻辑
                return generateRecommendation(conversationState.budget, conversationState.vehicleType, conversationState.fuelType);
            } else {
                return "请选择动力类型：纯电动、燃油车、混合动力，或者回复“都可以”。";
            }
        }
        
        // 如果已经在推荐后，用户继续问细节或修改条件
        if (conversationState.step === 'recommending') {
            if (msg.includes('推荐') || msg.includes('还有别的') || msg.includes('其他')) {
                return generateRecommendation(conversationState.budget, conversationState.vehicleType, conversationState.fuelType, true);
            } else if (msg.includes('预算') || msg.includes('改') || msg.includes('换')) {
                conversationState = { step: 'initial', budget: null, vehicleType: null, fuelType: null };
                return "好的，我们重新来。请告诉我您的购车预算（例如“15万左右”）。";
            } else {
                // 回答常见咨询
                if (msg.includes('续航')) return "目前主流纯电车续航在500-700km，部分旗舰可达1000km（CLTC）。您有特定车型想对比吗？";
                if (msg.includes('保值')) return "燃油车丰田、本田保值率较高；新能源中特斯拉、比亚迪表现不错。需要详细保值率数据可以告诉我具体车型。";
                if (msg.includes('充电')) return "家用充电桩7kW约6-10小时充满，快充30分钟可从30%到80%。购车大多送充电桩安装服务。";
                return "您还想了解哪方面？我可以帮您对比具体车型、落地价、贷款方案等。或者回复“重置”重新开始选车。";
            }
        }
        
        // 兜底回复
        return "我没太理解，您可以试着告诉我预算、车型偏好或动力类型。也可以回复“重置”重新开始。";
    }
    
    function generateRecommendation(budget, vehicleType, fuelType, isAlternative = false) {
        const budgetNum = parseBudget(budget);
        let recommendation = "";
        
        // 基于规则的真实车型推荐 (模拟真实数据)
        if (vehicleType === 'SUV') {
            if (budgetNum <= 15) {
                recommendation = "💰 15万内燃油SUV：哈弗H6、长安CS75 PLUS、吉利博越L。\n🔋 纯电SUV：广汽埃安AION Y、比亚迪元PLUS。";
            } else if (budgetNum <= 25) {
                if (fuelType === '纯电动') recommendation = "⚡ 20-25万纯电SUV推荐：小鹏G6、比亚迪宋L、深蓝S7。\n续航扎实，智驾体验好。";
                else if (fuelType === '混合动力') recommendation = "🔋 混动SUV推荐：比亚迪宋PLUS DM-i、吉利银河L7、哈弗枭龙MAX。\n省油+无续航焦虑。";
                else recommendation = "🚙 20-25万热门SUV：本田CR-V、丰田RAV4荣放（燃油）；比亚迪唐DM-i（混动）；大众途观L。";
            } else if (budgetNum <= 40) {
                if (fuelType === '纯电动') recommendation = "🏆 30-40万纯电SUV：蔚来ES6、理想L7（增程）、小鹏G9、特斯拉Model Y。\n换电/超充/智能驾驶各有优势。";
                else recommendation = "✨ 30-40万豪华SUV：宝马X3、奔驰GLC、奥迪Q5L；混动可选理想L8、问界M7。";
            } else {
                recommendation = "💎 50万以上高端SUV：保时捷Macan、宝马X5、奔驰GLE；电动可选蔚来ES8、特斯拉Model X、高合HiPhi。";
            }
        } 
        else if (vehicleType === '轿车') {
            if (budgetNum <= 15) {
                recommendation = "🚗 15万内燃油轿车：日产轩逸、大众朗逸、比亚迪秦PLUS DM-i（可油可电）。\n纯电轿车：秦PLUS EV、广汽埃安AION S。";
            } else if (budgetNum <= 25) {
                if (fuelType === '纯电动') recommendation = "⚡ 20-25万纯电轿车：比亚迪海豹、小鹏P7i、特斯拉Model 3、极氪007。";
                else recommendation = "🌟 20万级热门轿车：丰田凯美瑞、本田雅阁、大众帕萨特；混动：比亚迪海豹DM-i。";
            } else if (budgetNum <= 40) {
                recommendation = "🎩 30-40万轿车：宝马3系、奥迪A4L、奔驰C级；电动：蔚来ET5、极氪001、智己L6。";
            } else {
                recommendation = "🏁 高端轿车：宝马5系、奔驰E级、奥迪A6L；电动：蔚来ET7、特斯拉Model S。";
            }
        }
        else if (vehicleType === 'MPV') {
            if (budgetNum <= 20) recommendation = "👨‍👩‍👧‍👦 家用MPV：传祺M6、五菱凯捷、吉利嘉际。";
            else if (budgetNum <= 35) recommendation = "🚐 热门MPV：传祺M8、荣威iMAX8、本田奥德赛；电动：腾势D9 DM-i。";
            else recommendation = "💼 豪华MPV：别克GL8艾维亚、丰田赛那、极氪009（纯电）、岚图梦想家。";
        }
        else {
            recommendation = "我们有很多车型供您选择，您可以告诉我更具体的需求（比如轿车/SUV），我会重新推荐。";
        }
        
        const extra = isAlternative ? "\n\n以上是其他同价位优质选择，需要我详细对比其中两款吗？" : "\n\n需要我详细介绍某款车的落地价、配置或真实车主口碑吗？直接问我即可～";
        return `根据您的需求（预算 ${budget}，${vehicleType}，${fuelType === '任意' ? '动力不限' : fuelType}）：\n\n${recommendation}${extra}`;
    }
    
    function parseBudget(budgetStr) {
        const match = budgetStr.match(/(\d+)/);
        if (!match) return 20;
        let num = parseInt(match[1]);
        if (budgetStr.includes('-')) {
            const parts = budgetStr.match(/(\d+)[\-~](\d+)/);
            if (parts) num = (parseInt(parts[1]) + parseInt(parts[2])) / 2;
        }
        return num;
    }
    
    async function handleUserMessage(text) {
        if (!text.trim()) return;
        addMessage(text, 'user');
        userInput.value = '';
        showTyping(() => {
            const reply = getAIResponse(text);
            addMessage(reply, 'ai');
        });
    }
    
    sendBtn.addEventListener('click', () => {
        const msg = userInput.value.trim();
        if (msg) handleUserMessage(msg);
    });
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const msg = userInput.value.trim();
            if (msg) handleUserMessage(msg);
        }
    });
    
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const msg = btn.getAttribute('data-msg');
            handleUserMessage(msg);
        });
    });
</script>
</body>
</html>
